# overlays/audio/jack_tuning.conf
# Paramètres JACK ajustables sans éditer ~/.jackdrc.
# Lu par start_atome.sh si besoin d'override.

# Sample rate (Hz)
JACK_SAMPLE_RATE=48000

# Frames par buffer (128 = ~2.6 ms @ 48k ; 64 = ~1.3 ms, plus risqué)
JACK_FRAMES=128

# Nombre de périodes (2 minimum OSS, 3 pour + de marge)
JACK_PERIODS=2

# Priorité temps réel (0-99 ; >80 requiert ulimit -r et classe audio)
JACK_RT_PRIORITY=70

# Backend (oss sur FreeBSD)
JACK_BACKEND=oss
JACK_DEVICE=/dev/dsp

# Canaux in/out (ajuster selon l'interface audio)
JACK_CHANNELS_IN=2
JACK_CHANNELS_OUT=2
