# overlays/boot/rc.conf — services Atome OS
# Appended to /etc/rc.conf dans l'image finale.

# --- Silence démarrage ---
rc_startmsgs="NO"
background_fsck="YES"
background_fsck_delay="0"

# --- Hostname par défaut (remplacé au premier boot si dhcp fournit) ---
hostname="atomeos"

# --- Services système de base ---
sshd_enable="YES"
sshd_flags="-oPermitRootLogin=no -oPasswordAuthentication=no"
sendmail_enable="NONE"
sendmail_submit_enable="NO"
sendmail_outbound_enable="NO"
sendmail_msp_queue_enable="NO"

# --- Powerd pour portables ---
powerd_enable="YES"
powerd_flags="-a adaptive -b adaptive"

# --- NTP ---
ntpd_enable="YES"
ntpd_sync_on_start="YES"

# --- Dumpdev off (évite messages crash dump) ---
dumpdev="NO"

# --- Désactive syslog vers console ---
syslogd_flags="-ss"
