[package]
name = "squirrel-bevy-renderer"
version = "0.1.0"
edition = "2021"
description = "Unique Bevy WebGPU renderer surface for Atome/eVe web projection"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
atome-bevy-renderer-core = { path = "../../../atome/renderers/bevy-core" }
bevy = { version = "0.18.1", default-features = false, features = [
    "default_app",
    "bevy_window",
    "bevy_winit",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_camera",
    "bevy_asset",
    "bevy_image",
    "bevy_sprite",
    "bevy_sprite_render",
    "bevy_text",
    "jpeg",
    "png",
    "webp",
    "webgpu",
] }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "=0.2.106"

[profile.release]
opt-level = "s"
lto = true
