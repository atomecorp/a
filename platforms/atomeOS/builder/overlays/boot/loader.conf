# overlays/boot/loader.conf — Atome OS boot silencieux + splash
#
# Appended to /boot/loader.conf dans l'image finale.

# --- Silence total ---
boot_mute="YES"
beastie_disable="YES"
loader_color="NO"
autoboot_delay="0"

# --- Console vt + framebuffer pour splash ---
kern.vty="vt"
hw.vga.textmode="0"

# --- Splash bitmap ---
splash_bmp_load="YES"
bitmap_load="YES"
bitmap_name="/boot/atome_logo.bmp"

# --- Quiet kernel ---
kern.quiet_boot="1"
verbose_loading="NO"

# --- Réduit la verbosité des modules ---
hint.acpi.0.disabled="0"
