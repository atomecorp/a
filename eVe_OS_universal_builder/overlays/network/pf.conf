# overlays/network/pf.conf
# Firewall PF — posture kiosk.
# Sortant : autorisé.
# Entrant : bloqué sauf boucle locale et mDNS (pour découverte atome.local).

set skip on lo
set block-policy return

# Scrub incoming (normalise les paquets)
scrub in all

# --- Par défaut tout bloqué ---
block in all
pass  out all keep state

# --- Autoriser mDNS / avahi pour sync local ---
pass in proto udp from any to any port 5353 keep state

# --- Atome backend (127.0.0.1 uniquement) ---
pass in on lo0 proto tcp from any to 127.0.0.1 port { 3000, 3001 } keep state

# --- SSH : bloqué par défaut, activable via config utilisateur ---
# pass in proto tcp to any port 22 keep state
