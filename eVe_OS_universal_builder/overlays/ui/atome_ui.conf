# overlays/ui/atome_ui.conf
# Config du lanceur start_atome.sh
# Source comme fichier shell.

# URL du backend local
ATOME_BACKEND_URL="http://127.0.0.1:3001"

# Timeout d'attente du backend avant de lancer la webview (secondes)
ATOME_WAIT_TIMEOUT=30

# Paramètres Wayland
WLR_RENDERER="gles2"    # gles2 | pixman | vulkan (si supporté)
