# overlays/audio/sysctl_audio.conf
# Tuning OSS FreeBSD pour audio basse latence.

# Mode bit-perfect (pas de conversion samplerate silencieuse)
hw.snd.feeder_rate_quality=4
hw.snd.default_auto=0
hw.snd.verbose=0

# Augmente la taille du pool audio (évite underruns sur charges élevées)
hw.snd.maxautovchans=16
hw.snd.latency=1

# OSS buffer tuning — plus petit = latence réduite au prix de la robustesse
# (128 frames @ 48kHz ≈ 2.6 ms)
dev.pcm.0.rec.vchanformat=s32le:2.0
dev.pcm.0.play.vchanformat=s32le:2.0

# USB audio : priorité noyau
kern.sched.preempt_thresh=224
